<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>TD18</title>
  </head>
  <body>
    <header>
      <h2>Hello<span class="name"></span></h2>

        <div class="color-box" data-color="red">Red</div>
        <div class="color-box" data-color="blue">Blue</div>
        <div class="color-box" data-color="green">Green</div>
        <div class="color-box" data-color="yellow">Yellow</div>
      </div>
      <div class="input-container">
        <input type="text" id="nameInput" placeholder="Enter your name" />
        <button id="submitBtn">Greet</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
