<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TD5: CSS</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="main">
      <div class="main-img">
        <img
          src="https://cdn3d.iconscout.com/3d/premium/thumb/laundry-3d-icon-png-download-8530782.png?f=webp"
          alt="machine"
        />
      </div>
      <div class="main-content">
        <div class="form-heading">
          <h2>Hello Again!</h2>
          <div>Welcome back! we missed you!</div>
        </div>
        <form action="" method="post">
          <div class="email">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="Emailid@site.com"
              required
            />
          </div>
          <div class="password">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <a
              href=""
              target="_blank"
              rel="noopener noreferrer"
              class="forgot-password"
              >Forgot Password</a
            >
          </div>
          <button type="submit">Login</button>
        </form>
        <div class="register">
          <p>Not a member? <a href="" class="register-link">Register now</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
